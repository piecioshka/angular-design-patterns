# This workflow will do a clean install of node dependencies, build the source code and deploy it to GitHub Pages
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Deployment

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run test:ci
      - run: npm run build -- --prod --base-href=/angular-design-patterns/
      - name: GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          # Build directory to deploy
          build_dir: dist/angular-design-patterns/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
